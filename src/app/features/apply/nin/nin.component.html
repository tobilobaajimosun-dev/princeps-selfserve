<section class="step">
  <app-wizard-progress [current]="6" [total]="14" [label]="'step.nin.eyebrow' | t" />

  <header class="head">
    <h1 class="title">{{ 'step.nin.title' | t }}</h1>
    <p class="subtitle">{{ 'step.nin.subtitle' | t }}</p>
  </header>

  <form class="form" (submit)="$event.preventDefault(); submit()" novalidate>
    <div class="field" [class.is-invalid]="nin.touched && nin.invalid">
      <label class="label" for="nin">{{ 'step.nin.label' | t }}</label>
      <input
        id="nin"
        class="input"
        type="text"
        inputmode="numeric"
        autocomplete="off"
        maxlength="11"
        [formControl]="nin"
        (input)="onInput($event)"
      />
      @if (nin.touched && nin.invalid) {
        <p class="msg msg--error">{{ 'step.nin.invalid' | t }}</p>
      } @else {
        <p class="msg">{{ 'step.nin.hint' | t }}</p>
      }
    </div>

    @if (errorKey(); as key) {
      <p class="server-error" role="alert">
        {{ key | t }}
        @if (serverError() === 'name-mismatch') {
          <br /><a class="link" href="#">{{ 'step.nin.support' | t }}</a>
        }
      </p>
    }

    <button type="button" class="cta" [disabled]="!canSubmit()" (click)="submit()">
      <span>{{ submitting() ? ('step.nin.verifying' | t) : ('step.nin.verify' | t) }}</span>
      @if (!submitting()) {
        <svg class="cta-arrow" width="18" height="18" viewBox="0 0 20 20" fill="none" aria-hidden="true">
          <path d="M4 10H16M16 10L11 5M16 10L11 15" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
      }
    </button>
  </form>
</section>
