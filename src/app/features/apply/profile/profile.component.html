<section class="step">
  <app-wizard-progress [current]="5" [total]="11" [label]="'step.profile.eyebrow' | t" />

  <header class="head">
    <h1 class="title">{{ 'step.profile.title' | t }}</h1>
    <p class="subtitle">{{ 'step.profile.subtitle' | t }}</p>
  </header>

  <form class="form" [formGroup]="form" (ngSubmit)="continue()" novalidate>
    <div class="field">
      <label class="label" for="name">{{ 'step.profile.name.label' | t }}</label>
      <input id="name" class="input" type="text" formControlName="fullName" autocomplete="name" />
      <p class="msg">{{ 'step.profile.name.hint' | t }}</p>
    </div>

    <div class="field">
      <label class="label" for="dob">{{ 'step.profile.dob.label' | t }}</label>
      <input id="dob" class="input" type="date" formControlName="dateOfBirth" />
    </div>

    <div class="field">
      <label class="label" for="street">{{ 'step.profile.address.label' | t }}</label>
      <input id="street" class="input" type="text" formControlName="street" autocomplete="street-address" />
    </div>

    <div class="row">
      <div class="field">
        <label class="label" for="state">{{ 'step.profile.state.label' | t }}</label>
        <select id="state" class="input" formControlName="stateName">
          <option value="" disabled>—</option>
          @for (s of states; track s) {
            <option [value]="s">{{ s }}</option>
          }
        </select>
      </div>

      <div class="field">
        <label class="label" for="lga">{{ 'step.profile.lga.label' | t }}</label>
        <input id="lga" class="input" type="text" formControlName="lga" />
      </div>
    </div>

    <div class="field">
      <label class="label" for="rel">{{ 'step.profile.relationship.label' | t }}</label>
      <select id="rel" class="input" formControlName="relationshipStatus">
        <option value="single">{{ 'step.profile.relationship.single' | t }}</option>
        <option value="married">{{ 'step.profile.relationship.married' | t }}</option>
        <option value="divorced">{{ 'step.profile.relationship.divorced' | t }}</option>
        <option value="widowed">{{ 'step.profile.relationship.widowed' | t }}</option>
      </select>
    </div>

    <div class="field">
      <label class="label label--optional" for="religion">{{ 'step.profile.religion.label' | t }}</label>
      <input id="religion" class="input" type="text" formControlName="religion" />
      <p class="msg">{{ 'step.profile.religion.hint' | t }}</p>
    </div>

    <button type="submit" class="cta" [disabled]="!canContinue() || submitting()">
      <span>{{ 'step.profile.continue' | t }}</span>
      <svg class="cta-arrow" width="18" height="18" viewBox="0 0 20 20" fill="none" aria-hidden="true">
        <path d="M4 10H16M16 10L11 5M16 10L11 15" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" />
      </svg>
    </button>
  </form>
</section>
