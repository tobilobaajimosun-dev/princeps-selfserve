<section class="step">
  <app-wizard-progress [current]="2" [total]="13" [label]="'step.otp.eyebrow' | t" />

  <header class="head">
    <h1 class="title">{{ 'step.otp.title' | t }}</h1>
    <p class="subtitle">
      {{ 'step.otp.subtitle' | t: { target: maskedTarget() } }}
    </p>
  </header>

  <form class="form" (submit)="$event.preventDefault(); submit()" novalidate>
    <div
      class="otp"
      role="group"
      [attr.aria-label]="'step.otp.title' | t"
      [class.is-invalid]="!!error()"
    >
      @for (i of indices; track i) {
        <input
          #cell
          class="otp-cell"
          type="text"
          inputmode="numeric"
          autocomplete="one-time-code"
          maxlength="1"
          [attr.aria-label]="'digit ' + (i + 1)"
          [attr.aria-invalid]="!!error() ? true : null"
          (input)="onCellInput(i, $event)"
          (keydown)="onCellKeydown(i, $event)"
          (paste)="onCellPaste($event)"
        />
      }
    </div>

    @if (errorKey(); as key) {
      <p class="msg msg--error" role="alert">
        {{ key | t: errorParams() }}
      </p>
    } @else if (justResent()) {
      <p class="msg msg--ok" role="status">{{ 'step.otp.resent' | t }}</p>
    } @else {
      <p class="msg msg--hint">{{ 'step.otp.spam.hint' | t }}</p>
    }

    <div class="actions">
      <button
        type="button"
        class="link-btn"
        [disabled]="resendCooldown() > 0 || resending()"
        (click)="resend()"
      >
        @if (resendCooldown() > 0) {
          {{ 'step.otp.resend.wait' | t: { seconds: resendCooldown() } }}
        } @else {
          {{ 'step.otp.resend' | t }}
        }
      </button>

      <button type="button" class="link-btn link-btn--muted" (click)="goBack()">
        {{ 'step.otp.change.email' | t }}
      </button>
    </div>

    <button type="submit" class="cta" [disabled]="!canSubmit()">
      <span>{{ submitting() ? ('step.otp.verifying' | t) : ('step.otp.verify' | t) }}</span>
      @if (!submitting()) {
        <svg class="cta-arrow" width="18" height="18" viewBox="0 0 20 20" fill="none" aria-hidden="true">
          <path d="M4 10H16M16 10L11 5M16 10L11 15" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
      }
    </button>
  </form>
</section>
