<section class="step">
  <app-wizard-progress [current]="3" [total]="14" [label]="'step.employment.eyebrow' | t" />

  <header class="head">
    <h1 class="title">{{ 'step.employment.title' | t }}</h1>
    <p class="subtitle">{{ 'step.employment.subtitle' | t }}</p>
  </header>

  <ul class="options" role="radiogroup" [attr.aria-label]="'step.employment.title' | t">
    @for (opt of options; track opt.type) {
      <li>
        <button
          type="button"
          role="radio"
          class="option"
          [class.is-selected]="selected() === opt.type"
          [class.is-coming-soon]="!opt.live"
          [attr.aria-checked]="selected() === opt.type"
          (click)="select(opt.type)"
        >
          <span class="option-body">
            <span class="option-label">{{ opt.labelKey | t }}</span>
            <span class="option-hint">{{ opt.hintKey | t }}</span>
          </span>
          @if (!opt.live) {
            <span class="chip">{{ 'step.employment.coming.soon' | t }}</span>
          } @else {
            <span class="mark" aria-hidden="true">
              <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                <path d="M4 10.5L8 14.5L16 6.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" />
              </svg>
            </span>
          }
        </button>
      </li>
    }
  </ul>

  @if (showCorperMonths()) {
    <aside class="nysc-notice" role="note">
      <p class="nysc-notice-headline">{{ 'step.employment.corper.cap.headline' | t }}</p>
      <p class="nysc-notice-body">{{ 'step.employment.corper.cap.body' | t }}</p>
    </aside>

    <div class="field">
      <label class="label" for="months">{{ 'step.employment.corper.months.label' | t }}</label>
      <input
        id="months"
        class="input"
        type="number"
        inputmode="numeric"
        min="1"
        max="11"
        [formControl]="nyscMonths"
      />
      <p class="msg">{{ 'step.employment.corper.months.hint' | t }}</p>
    </div>
  }

  <button type="button" class="cta" [disabled]="!canContinue() || submitting()" (click)="continue()">
    <span>{{ 'step.employment.continue' | t }}</span>
    <svg class="cta-arrow" width="18" height="18" viewBox="0 0 20 20" fill="none" aria-hidden="true">
      <path d="M4 10H16M16 10L11 5M16 10L11 15" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" />
    </svg>
  </button>
</section>
