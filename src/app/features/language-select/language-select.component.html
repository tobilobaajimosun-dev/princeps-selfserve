<main class="screen">
  <header class="brand-row">
    <img class="brand-logo" src="/princeps-logo.png" alt="Princeps Credit Systems Limited" width="180" height="40" />
    <app-read-aloud />
  </header>

  <section class="content">
    <h1 class="title">{{ 'lang.select.title' | t }}</h1>
    <p class="subtitle">{{ 'lang.select.subtitle' | t }}</p>

    <ul class="lang-list" role="radiogroup" [attr.aria-label]="'lang.select.title' | t">
      @for (l of languages; track l.code; let i = $index) {
        <li [style.--i]="i">
          <button
            type="button"
            class="lang-row"
            role="radio"
            [attr.aria-checked]="selected() === l.code"
            [class.is-selected]="selected() === l.code"
            (click)="choose(l.code)"
          >
            <span class="lang-endonym">{{ l.endonym }}</span>
            <span class="lang-english">{{ l.english }}</span>
            <span class="mark" aria-hidden="true">
              @if (selected() === l.code) {
                <svg width="18" height="18" viewBox="0 0 20 20" fill="none">
                  <path
                    d="M4 10.5L8 14.5L16 6"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  />
                </svg>
              }
            </span>
          </button>
        </li>
      }
    </ul>
  </section>

  <footer class="footer">
    <button type="button" class="cta" (click)="continue()">
      <span>{{ 'lang.select.continue' | t }}</span>
      <svg class="cta-arrow" width="18" height="18" viewBox="0 0 20 20" fill="none" aria-hidden="true">
        <path d="M4 10H16M16 10L11 5M16 10L11 15" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" />
      </svg>
    </button>
    <a class="signin" href="https://caltos-rho.vercel.app/portal/repayments" rel="noopener">
      {{ 'lang.select.signin' | t }}
    </a>

    <ul class="trust" aria-label="Regulatory disclosures">
      <li class="trust-item">
        <svg class="trust-icon" width="16" height="16" viewBox="0 0 20 20" fill="none" aria-hidden="true">
          <path d="M10 2L3 5v5c0 4.5 3 7.5 7 8 4-.5 7-3.5 7-8V5l-7-3z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round" />
          <path d="M7 10l2 2 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
        <span>{{ 'trust.cbn' | t }}</span>
      </li>
      <li class="trust-item">
        <svg class="trust-icon" width="16" height="16" viewBox="0 0 20 20" fill="none" aria-hidden="true">
          <rect x="3" y="7" width="14" height="10" rx="2" stroke="currentColor" stroke-width="1.5" />
          <path d="M7 7V5a3 3 0 016 0v2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
        </svg>
        <span>{{ 'trust.ndpr' | t }}</span>
      </li>
      <li class="trust-item">
        <a class="trust-link" href="mailto:complaints@princeps.ng?subject=Complaint" rel="noopener">{{ 'trust.complaints' | t }}</a>
        <span class="trust-sep" aria-hidden="true">·</span>
        <a class="trust-link" href="https://www.cbn.gov.ng/Supervision/consumerprotection.asp" target="_blank" rel="noopener">{{ 'trust.cbn.escalate' | t }}</a>
      </li>
    </ul>
  </footer>
</main>
