<main class="screen">
  <header class="brand-row">
    <img class="brand-logo" src="/princeps-logo.png" alt="Princeps Credit Systems Limited" width="180" height="40" />
    <app-read-aloud />
  </header>

  <section class="content">
    <h1 class="title">{{ 'lang.select.title' | t }}</h1>
    <p class="subtitle">{{ 'lang.select.subtitle' | t }}</p>

    <ul class="lang-list" role="radiogroup" [attr.aria-label]="'lang.select.title' | t">
      @for (l of languages; track l.code; let i = $index) {
        <li [style.--i]="i">
          <button
            type="button"
            class="lang-row"
            role="radio"
            [attr.aria-checked]="selected() === l.code"
            [class.is-selected]="selected() === l.code"
            (click)="choose(l.code)"
          >
            <span class="lang-endonym">{{ l.endonym }}</span>
            <span class="lang-english">{{ l.english }}</span>
            <span class="mark" aria-hidden="true">
              @if (selected() === l.code) {
                <svg width="18" height="18" viewBox="0 0 20 20" fill="none">
                  <path
                    d="M4 10.5L8 14.5L16 6"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  />
                </svg>
              }
            </span>
          </button>
        </li>
      }
    </ul>
  </section>

  <footer class="footer">
    <button type="button" class="cta" (click)="continue()">
      <span>{{ 'lang.select.continue' | t }}</span>
      <svg class="cta-arrow" width="18" height="18" viewBox="0 0 20 20" fill="none" aria-hidden="true">
        <path d="M4 10H16M16 10L11 5M16 10L11 15" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" />
      </svg>
    </button>
    <a class="signin" href="https://caltos-rho.vercel.app/portal/repayments" rel="noopener">
      {{ 'lang.select.signin' | t }}
    </a>
  </footer>
</main>
